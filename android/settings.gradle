pluginManagement {
    def flutterSdkPath = getFlutterSdkPath()
    if (flutterSdkPath == null) {
        throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
    }

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
}

include ":app"

def flutterSdkPath = getFlutterSdkPath()
if (flutterSdkPath != null) {
    include ":flutter"
    project(":flutter").projectDir = new File(flutterSdkPath, "packages/flutter/android")
}

def getFlutterSdkPath() {
    def localPropertiesFile = new File(rootDir, "local.properties")
    if (localPropertiesFile.exists()) {
        def properties = new Properties()
        localPropertiesFile.withInputStream { stream -> properties.load(stream) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        if (flutterSdkPath != null) {
            return flutterSdkPath
        }
    }
    return System.getenv("FLUTTER_SDK")
}
